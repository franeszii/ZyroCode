<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>ZyroCode - Skrypty</title>

<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">

<style>

body{
background:#111;
color:white;
font-family:'Cherry Bomb One', cursive;
text-align:center;
margin:0;
}

.navbar{
background:#0d0d0d;
padding:15px;
}

.navbar button{
background:none;
border:none;
color:white;
font-size:18px;
margin:0 10px;
cursor:pointer;
font-family:'Cherry Bomb One', cursive;
}

.navbar button:hover{
color:#00ff6a;
}

h1{
color:#00ff6a;
font-size:55px;
margin-top:40px;
}

.subtitle{
color:gray;
font-size:20px;
margin-bottom:40px;
}

.container{
width:700px;
margin:auto;
}

.script-box{
background:#2a2a2a;
padding:20px;
margin:15px 0;
border-radius:12px;
display:flex;
align-items:center;
justify-content:space-between;
cursor:pointer;
transition:0.25s;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.script-box:hover{
background:#3a3a3a;
transform:scale(1.03);
}

.left{
display:flex;
align-items:center;
}

.logo{
width:45px;
margin-right:15px;
}

.script-name{
font-size:24px;
}

.emoji{
font-size:28px;
}

</style>
</head>

<body>

<div class="navbar">
<button onclick="window.location.href='index.html'">Strona Główna</button>
<button onclick="window.open('https://dc.gg/zyrocode')">Discord</button>
<button onclick="window.open('https://1477245639724367974.botpanel.gg/')">ZyroBot</button>
</div>

<h1>SKRYPTY</h1>
<div class="subtitle">kliknij aby pobrać</div>

<div class="container">

<div class="script-box" onclick="download('downloads/zyroitemy.sk')">
<div class="left">
<img src="logo.png" class="logo">
<div class="script-name">Zyro Itemy</div>
</div>
<div class="emoji">⚔️</div>
</div>

<div class="script-box" onclick="download('downloads/daily.sk')">
<div class="left">
<img src="logo.png" class="logo">
<div class="script-name">Daily</div>
</div>
<div class="emoji">📅</div>
</div>

<div class="script-box" onclick="download('downloads/socialmedia.sk')">
<div class="left">
<img src="logo.png" class="logo">
<div class="script-name">Social Media</div>
</div>
<div class="emoji">🌐</div>
</div>

<div class="script-box" onclick="download('downloads/randomevents.sk')">
<div class="left">
<img src="logo.png" class="logo">
<div class="script-name">Random Events</div>
</div>
<div class="emoji">🎲</div>
</div>

</div>

<script>
function download(file){
const link = document.createElement("a");
link.href = file;
link.download = "";
link.click();
}
</script>

</body>
</html>
