<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>ZyroCode - Skrypty</title>

<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">

<style>

/* BODY */
body{
  background:#111;
  margin:0;
  color:white;
  font-family:'Cherry Bomb One', cursive;
  text-align:center;
}

/* NAVBAR */
.navbar{
  background:#0d0d0d;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:20px;
  box-shadow:0 0 10px black;
}

.navbar button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
  font-family:'Cherry Bomb One', cursive;
  transition:0.2s;
}

.navbar button:hover{
  color:#00ff6a;
  transform:scale(1.1);
}

/* TITLE */
h1{
  color:#00ff6a;
  font-size:60px;
  margin-top:40px;
  text-shadow:0 0 8px rgba(0,255,100,0.5);
}

.subtitle{
  color:gray;
  font-size:20px;
  margin-bottom:40px;
}

/* CONTAINER */
.container{
  width:700px;
  margin:auto;
}

/* SCRIPT BOX */
.script-box{
  background:#2a2a2a;
  padding:20px;
  margin:15px 0;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 0 12px rgba(0,0,0,0.4);
}

.script-box:hover{
  background:#3a3a3a;
  transform:scale(1.04);
  box-shadow:0 0 15px rgba(0,255,100,0.25);
}

/* LEFT PART */
.left{
  display:flex;
  align-items:center;
}

.logo{
  width:45px;
  margin-right:15px;
}

.script-name{
  font-size:26px;
}

/* EMOJI */
.emoji{
  font-size:28px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="window.location.href='index.html'">Strona Główna</button>
  <button onclick="window.open('https://dc.gg/zyrocode')">Discord</button>
  <button onclick="window.open('https://1477245639724367974.botpanel.gg/')">ZyroBot</button>
  <button onclick="window.location.href='skrypty.html'">Skrypty</button>
</div>

<!-- TITLE -->
<h1>SKRYPTY</h1>
<div class="subtitle">kliknij aby pobrać</div>

<div class="container">

  <div class="script-box" onclick="download('downloads/zyrocode-zyroitemy.sk')">
    <div class="left">
      <img src="logo.png" class="logo">
      <div class="script-name">Zyro Itemy</div>
    </div>
    <div class="emoji">⚔️</div>
  </div>

  <div class="script-box" onclick="download('downloads/zyrocode-daily.sk')">
    <div class="left">
      <img src="logo.png" class="logo">
      <div class="script-name">Daily</div>
    </div>
    <div class="emoji">📅</div>
  </div>

  <div class="script-box" onclick="download('downloads/zyrocode-socialeservera.sk')">
    <div class="left">
      <img src="logo.png" class="logo">
      <div class="script-name">Social Media</div>
    </div>
    <div class="emoji">🌐</div>
  </div>

  <div class="script-box" onclick="download('downloads/zyrocode-randomevents.sk')">
    <div class="left">
      <img src="logo.png" class="logo">
      <div class="script-name">Random Events</div>
    </div>
    <div class="emoji">🎲</div>
  </div>

</div>

<script>
function download(file){
  const a = document.createElement("a");
  a.href = file;
  a.download = "";
  document.body.appendChild(a);
  a.click();
  a.remove();
}
</script>

</body>
</html>
